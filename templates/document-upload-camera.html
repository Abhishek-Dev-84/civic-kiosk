{% load i18n %}
{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>{% trans "Camera Upload - Civic Kiosk" %}</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;user-select:none;}
body{width:100vw;height:100vh;overflow:hidden;background:#f0f7ff;}
.header{height:70px;background:white;display:flex;align-items:center;justify-content:space-between;padding:0 20px;border-bottom:2px solid #1e5fbf;}
.header-left{display:flex;align-items:center;gap:10px;}
.header-left img{height:40px;}
.header-left div{font-size:12px;font-weight:600;color:#1e5fbf;line-height:1.2;}
.header-right img{height:35px;}

.voice-corner{position:fixed;top:80px;right:15px;z-index:1000;display:flex;flex-direction:column;align-items:center;gap:3px;}
.voice-corner-btn{background:#ff9933;width:45px;height:45px;border-radius:50%;border:2px solid white;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:24px;}
.voice-corner-btn.listening{background:#28a745;}
.voice-corner-text{background:white;padding:2px 8px;border-radius:12px;font-size:10px;color:#ff9933;border:1px solid #ff9933;}

.back-btn{position:fixed;top:80px;left:15px;background:white;border:2px solid #1e5fbf;border-radius:30px;padding:5px 15px;font-size:18px;font-weight:700;cursor:pointer;color:#1e5fbf;z-index:1000;}

.container{position:fixed;top:70px;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px;}
.content-wrapper{width:100%;max-width:600px;text-align:center;}
h1{color:#1e5fbf;font-size:36px;font-weight:800;margin-bottom:20px;}

.camera-container{background:black;border:4px solid #1e5fbf;border-radius:30px;overflow:hidden;margin:20px 0;}
#camera{width:100%;max-height:400px;object-fit:cover;display:block;}

.camera-controls{display:flex;gap:15px;margin:20px 0;}
.capture-btn,.switch-btn{color:white;font-size:24px;padding:15px;border-radius:50px;flex:1;border:none;cursor:pointer;}
.capture-btn{background:#28a745;}
.switch-btn{background:#1e5fbf;}

.preview-container{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:20px 0;}
.preview-item{background:white;border:2px solid #1e5fbf;border-radius:15px;padding:5px;position:relative;}
.preview-item img{width:100%;height:80px;object-fit:cover;border-radius:10px;}
.preview-item .remove{position:absolute;top:-5px;right:-5px;background:#dc3545;color:white;width:25px;height:25px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;}

.upload-btn{background:#ff9933;color:white;font-size:24px;padding:15px;border-radius:50px;width:100%;border:none;cursor:pointer;margin-top:10px;}
.hidden{display:none;}
canvas{display:none;}
</style>
</head>

<body>

<div class="header">
<div class="header-left">
<img src="https://upload.wikimedia.org/wikipedia/commons/5/55/Emblem_of_India.svg">
<div>{% trans "Ministry of Electronics &" %}<br>{% trans "Information Technology" %}<br>{% trans "Government of India" %}</div>
</div>
<div class="header-right">
<img src="https://www.cdac.in/img/cdac-logo.png">
</div>
</div>

<!-- Voice corner will be created dynamically by voice.js -->

<div class="back-btn" onclick="goBack()">← {% trans "Back" %}</div>

<div class="container">
<div class="content-wrapper">
<h1>📸 {% trans "Camera Upload" %}</h1>

<div class="camera-container">
<video id="camera" autoplay playsinline></video>
</div>

<div class="camera-controls">
<button class="capture-btn" onclick="captureImage()">📸 {% trans "Capture" %}</button>
<button class="switch-btn" onclick="switchCamera()">🔄 {% trans "Switch" %}</button>
</div>

<div id="previewSection" class="hidden">
<div style="font-size:20px;color:#1e5fbf;margin:10px 0;">{% trans "Captured Images" %}</div>
<div class="preview-container" id="previewContainer"></div>
<button class="upload-btn" onclick="uploadImages()">⬆️ {% trans "Upload All" %}</button>
</div>

</div>
</div>

<canvas id="canvas"></canvas>

<script src="{% static 'js/voice.js' %}"></script>

<script>
/* ================= CAMERA ================= */

const video=document.getElementById('camera');
const canvas=document.getElementById('canvas');
const previewContainer=document.getElementById('previewContainer');
const previewSection=document.getElementById('previewSection');
let currentStream=null;
let capturedImages=[];
let usingFrontCamera=false;

function startCamera(front=false){
const constraints={video:{facingMode:front?'user':'environment'}};
if(currentStream){currentStream.getTracks().forEach(t=>t.stop());}
navigator.mediaDevices.getUserMedia(constraints)
.then(stream=>{currentStream=stream;video.srcObject=stream;})
.catch(()=>alert("Camera not available"));
}
startCamera(false);

function switchCamera(){
usingFrontCamera=!usingFrontCamera;
startCamera(usingFrontCamera);
if(typeof speak === 'function') speak("Camera switched");
}

function captureImage(){
canvas.width=video.videoWidth;
canvas.height=video.videoHeight;
canvas.getContext('2d').drawImage(video,0,0);
const img=canvas.toDataURL('image/jpeg');
capturedImages.push(img);
refreshPreview();
if(typeof speak === 'function') speak("Image captured");
}

function refreshPreview(){
previewContainer.innerHTML='';
capturedImages.forEach((img,index)=>{
const div=document.createElement('div');
div.className='preview-item';
div.innerHTML=`<img src="${img}"><div class="remove" onclick="removeImage(${index})">×</div>`;
previewContainer.appendChild(div);
});
previewSection.classList.toggle('hidden',capturedImages.length===0);
}

function removeImage(index){
capturedImages.splice(index,1);
refreshPreview();
}

function uploadImages(){
if(capturedImages.length===0){
if(typeof speak === 'function') speak("No images to upload");
return;
}
if(typeof speak === 'function') speak("Uploading images");
setTimeout(()=>{
if(typeof speak === 'function') speak("Upload successful");
window.location.href = "/" + getCurrentLangCode() + "/menu/";
},1500);
}

function goBack(){
if(typeof speak === 'function') speak("Going back");
window.location.href = "/" + getCurrentLangCode() + "/menu/";
}

/* ================= OVERRIDE VOICE COMMANDS ================= */

// Extend voice.js handleCommand for camera-specific commands
const originalHandleCommand = window.handleCommand;
window.handleCommand = function(command) {
    command = command.toLowerCase();
    console.log("Camera command:", command);
    
    // Camera-specific commands
    if(command.includes("capture") || command.includes("take photo") || command.includes("click")) {
        captureImage();
        return;
    }
    else if(command.includes("switch") || command.includes("change camera")) {
        switchCamera();
        return;
    }
    else if(command.includes("upload") || command.includes("send")) {
        uploadImages();
        return;
    }
    else if(command.includes("remove") || command.includes("delete")) {
        if(capturedImages.length > 0) {
            removeImage(capturedImages.length - 1);
        }
        return;
    }
    else if(command.includes("back") || command.includes("वापस") || command.includes("ପଛକୁ")) {
        goBack();
        return;
    }
    else if(command.includes("home") || command.includes("होम") || command.includes("ଘର")) {
        window.location.href = "/" + getCurrentLangCode() + "/";
        return;
    }
    
    // If not camera-specific, pass to original handler
    if(originalHandleCommand) {
        originalHandleCommand(command);
    }
};

// Override autoReadPage to read camera instructions
const originalAutoRead = window.autoReadPage;
window.autoReadPage = function() {
    if(originalAutoRead) originalAutoRead();
    setTimeout(() => {
        speak("Say capture to take photo, switch to change camera, upload to send");
    }, 2000);
};
</script>

</body>
</html>
