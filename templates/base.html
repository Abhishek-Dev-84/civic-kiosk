{% load i18n %}
{% load static %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE|default:'en' }}">
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://upload.wikimedia.org https://www.cdac.in; font-src 'self';">
    <meta name="referrer" content="same-origin">
    <meta name="robots" content="noindex, nofollow">

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <meta charset="UTF-8">
    <title>{% block title %}Civic Services Kiosk{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #f0f7ff;
        }

        .header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 70px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 2px solid #1e5fbf;
            z-index: 1000;
        }

        .kiosk-container {
            position: fixed;
            top: 70px;
            left: 0;
            right: 0;
            bottom: 0;
            padding: 20px;
            overflow-y: auto;
        }
    </style>

    {% block extra_head %}{% endblock %}
</head>

<body>

<!-- ✅ SAFE CSRF HANDLING -->
<form id="csrfForm" method="POST" style="display:none;">
    {% csrf_token %}
</form>

<input type="hidden" id="csrf_token" value="">

<script>
    // Extract CSRF token safely
    (function() {
        const tokenInput = document.querySelector('#csrfForm input[name=csrfmiddlewaretoken]');
        if (tokenInput) {
            document.getElementById('csrf_token').value = tokenInput.value;
        }
    })();
</script>

<!-- HEADER -->
<div class="header">
    <div>🇮🇳 Government of India</div>
    <div>C-DAC</div>
</div>

<!-- MAIN CONTENT -->
<div class="kiosk-container">
    {% block content %}{% endblock %}
</div>

<!-- ✅ SAFE URL HANDLING -->
{% url 'index' as index_url %}

<script src="{% static 'js/kiosk_core.js' %}"></script>

<script>
    try {
        if (typeof KioskCore !== "undefined") {
            KioskCore.init({
                csrfToken: document.querySelector('#csrf_token')?.value || "",
                logoutUrl: "{{ index_url|default:'/' }}",
                languageCode: "{{ LANGUAGE_CODE|default:'en' }}"
            });
        } else {
            console.warn("KioskCore not loaded");
        }
    } catch (e) {
        console.error("Init error:", e);
    }
</script>

{% block extra_scripts %}{% endblock %}

</body>
</html>
