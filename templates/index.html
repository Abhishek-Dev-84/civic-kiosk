{% load static %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}">
  <head>
    <style>
      /* Hide Google Translate elements */
      .goog-te-banner-frame.skiptranslate,
      .goog-te-gadget-icon,
      .goog-te-gadget-simple,
      #goog-gt-tt,
      .goog-te-balloon-frame,
      .goog-te-menu-frame,
      .goog-te-spinner-pos {
        display: none !important;
      }
      
      body {
        top: 0px !important;
        position: static !important;
      }
      
      .goog-te-combo {
        display: none !important;
      }
      
      .goog-te-gadget {
        color: transparent !important;
        height: 0 !important;
        overflow: hidden !important;
      }
    </style>

    <meta charset="UTF-8" />
    <title>Civic Services Kiosk - Language</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      .lang-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 25px;
        margin: 30px 0;
      }
      .lang-btn {
        background: white;
        border: 4px solid #1e5fbf;
        border-radius: 40px;
        padding: 35px 20px;
        font-size: 42px;
        font-weight: 800;
        text-align: center;
        cursor: pointer;
        color: #1e5fbf;
        box-shadow: 0 8px 0 #0a3d7a;
        min-height: 160px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .lang-btn:active {
        transform: translateY(8px);
        box-shadow: 0 2px 0 #0a3d7a;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        user-select: none;
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #f0f7ff;
      }
      .header {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 70px;
        background: white;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        border-bottom: 3px solid #1e5fbf;
        z-index: 1000;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }
      .header-left { display: flex; align-items: center; gap: 12px; }
      .header-left img { height: 42px; }
      .header-left div { font-size: 13px; font-weight: 600; color: #1e5fbf; line-height: 1.2; }
      .header-right img { height: 38px; }
      .kiosk-container {
        position: fixed;
        top: 70px;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 15px;
      }
      .content-wrapper { width: 100%; max-width: 700px; }
      h1 { color: #1e5fbf; font-size: 36px; font-weight: 800; text-align: center; }
      .timeout-warning {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: white;
        border: 4px solid #ff9933;
        border-radius: 40px;
        padding: 30px;
        text-align: center;
        z-index: 2000;
        display: none;
      }
      .timeout-warning button {
        background: #28a745;
        color: white;
        border: none;
        border-radius: 40px;
        padding: 15px 30px;
        font-size: 20px;
        font-weight: 700;
        cursor: pointer;
        margin: 10px;
      }
      .timeout-warning .logout-btn { background: #dc3545; }
    </style>
  </head>

  <body>
    <div class="header">
      <div class="header-left">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/55/Emblem_of_India.svg" />
        <div>
          Ministry of Electronics &<br />
          Information Technology<br />
          Government of India
        </div>
      </div>
      <div class="header-right">
        <img src="https://www.cdac.in/img/cdac-logo.png" />
      </div>
    </div>

    <div id="timeoutWarning" class="timeout-warning">
      <p>Session about to expire</p>
      <button onclick="extendSession()">Continue</button>
      <button class="logout-btn" onclick="window.location='/';">
        Logout  
      </button>
    </div>

    <div class="kiosk-container">
      <div class="content-wrapper">
        <h1>Select Language</h1>
        <div class="lang-grid">
          <div class="lang-btn" onclick="setLanguage('en')">English</div>
          <div class="lang-btn" onclick="setLanguage('hi')">हिंदी</div>
          <div class="lang-btn" onclick="setLanguage('or')">ଓଡ଼ିଆ</div>
          <div class="lang-btn" onclick="setLanguage('bn')">বাংলা</div>
          <div class="lang-btn" onclick="setLanguage('ta')">தமிழ்</div>
          <div class="lang-btn" onclick="setLanguage('te')">తెలుగు</div>
        </div>
      </div>
    </div>

    <script>
      // ================= SESSION TIMER =================
      let sessionTimer;
      const SESSION_DURATION = 120000;

      function startSessionTimer() {
        sessionTimer = setTimeout(() => {
          document.getElementById('timeoutWarning').style.display = 'block';
        }, SESSION_DURATION);
      }

      function extendSession() {
        document.getElementById('timeoutWarning').style.display = 'none';
        clearTimeout(sessionTimer);
        startSessionTimer();
      }

      // ================= LANGUAGE MAP =================
      const languageMap = {
        "en": "en-IN",
        "hi": "hi-IN",
        "ta": "ta-IN",
        "te": "te-IN",
        "bn": "bn-IN",
        "or": "or-IN"
      };

      function getCurrentLang() {
        const path = window.location.pathname.split('/');
        return languageMap[path[1]] || "en-IN";
      }

      function getCurrentLangCode() {
        const path = window.location.pathname.split('/');
        return path[1] || "en";
      }

      // ================= TEXT TO SPEECH =================
      function speak(text) {
        if (!('speechSynthesis' in window)) return;

        speechSynthesis.cancel();

        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = getCurrentLang();
        utterance.rate = 1;
        speechSynthesis.speak(utterance);
      }

      // ================= SPEECH RECOGNITION ENGINE =================
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      let recognition = SpeechRecognition ? new SpeechRecognition() : null;

      if (recognition) {
        recognition.lang = getCurrentLang();
        recognition.continuous = true;  // 🔥 Continuous kiosk mode
        recognition.interimResults = false;
      }

      // ================= AUTO READ PAGE =================
      function autoReadPage() {
        let heading = document.querySelector("h1");
        if (heading) {
          speak(heading.innerText);
        }
      }

      // ================= SET LANGUAGE FUNCTION =================
      function setLanguage(langCode) {
        document.cookie = 'django_language=' + langCode + '; path=/';
        if (sessionStorage) sessionStorage.clear();
        
        // Store selected language in session to know we came from language selection
        sessionStorage.setItem('selectedLanguage', langCode);
        
        // Navigate to auth page with language code
        window.location.href = '/' + langCode + '/auth/';
      }

      // ================= CHECK FOR RETURN FROM OTHER PAGES =================
      function checkLanguageOnLoad() {
        const path = window.location.pathname;
        
        // If we're at root (/) and we came from another page
        if (path === '/' || path === '') {
          // Clear any language indicators to ensure English is default
          document.documentElement.lang = 'en';
          
          // Update recognition language if it exists
          if (recognition) {
            recognition.lang = 'en-IN';
          }
          
          // Optionally, you can show a message that you're back to language selection
          setTimeout(() => {
            speak("Please select a language");
          }, 1000);
        }
      }

      // ================= UNIVERSAL COMMAND HANDLER =================
      function handleCommand(command) {
        command = command.toLowerCase();
        console.log("Heard:", command);

        const langCode = getCurrentLangCode();

        // LANGUAGE SELECTION
        if (command.includes("english")) setLanguage('en');
        else if (command.includes("hindi") || command.includes("हिंदी")) setLanguage('hi');
        else if (command.includes("odia") || command.includes("oriya") || command.includes("ଓଡ଼ିଆ")) setLanguage('or');
        else if (command.includes("bengali") || command.includes("bangla") || command.includes("বাংলা")) setLanguage('bn');
        else if (command.includes("tamil") || command.includes("தமிழ்")) setLanguage('ta');
        else if (command.includes("telugu") || command.includes("తెలుగు")) setLanguage('te');
        
        // BACK - Navigate to language selection page
        else if (command.includes("back") || command.includes("वापस") || command.includes("ପଛକୁ")) {
          window.location.href = "/" + langCode + "/";
        }
        
        // HOME - Go to root (language selection in English)
        else if (command.includes("home") || command.includes("होम") || command.includes("ଘର")) {
          window.location.href = "/";
        }
        
        // SUBMIT
        else if (command.includes("submit") || command.includes("जमा") || command.includes("ଦାଖଲ")) {
          let submitBtn = document.querySelector("button[type='submit'], .submit-btn");
          if (submitBtn) submitBtn.click();
        }
        
        // DEFAULT: Command not recognized
        else {
          speak("Command not recognized");
        }
      }

      // ================= START LISTENING =================
      function startVoiceEngine() {
        if (!recognition) return;

        recognition.lang = getCurrentLang();
        recognition.start();
      }

      if (recognition) {
        recognition.onresult = function(event) {
          let transcript = event.results[event.results.length - 1][0].transcript;
          handleCommand(transcript);
        };

        recognition.onerror = function() {
          recognition.stop();
          startVoiceEngine();
        };

        recognition.onend = function() {
          startVoiceEngine(); // 🔥 Auto restart (continuous kiosk)
        };
      }

      // ================= AUTO MIC BUTTON =================
      function createMicButton() {
        // Check if mic button already exists
        if (document.querySelector('.voice-corner')) return;

        const micContainer = document.createElement("div");
        micContainer.className = "voice-corner";
        micContainer.style.position = "fixed";
        micContainer.style.top = "80px";
        micContainer.style.right = "15px";
        micContainer.style.zIndex = "1000";
        micContainer.style.display = "flex";
        micContainer.style.flexDirection = "column";
        micContainer.style.alignItems = "center";
        micContainer.style.gap = "4px";

        const micButton = document.createElement("div");
        micButton.className = "voice-corner-btn";
        micButton.innerHTML = "🎤";
        micButton.style.background = "#ff9933";
        micButton.style.width = "50px";
        micButton.style.height = "50px";
        micButton.style.borderRadius = "50%";
        micButton.style.border = "3px solid white";
        micButton.style.boxShadow = "0 3px 8px rgba(0,0,0,0.2)";
        micButton.style.cursor = "pointer";
        micButton.style.display = "flex";
        micButton.style.alignItems = "center";
        micButton.style.justifyContent = "center";
        micButton.style.fontSize = "26px";

        const micText = document.createElement("div");
        micText.className = "voice-corner-text";
        micText.innerHTML = "Click to speak";
        micText.style.background = "white";
        micText.style.padding = "4px 10px";
        micText.style.borderRadius = "20px";
        micText.style.fontSize = "11px";
        micText.style.fontWeight = "600";
        micText.style.color = "#ff9933";
        micText.style.border = "1px solid #ff9933";

        micButton.onclick = function() {
          speak("Voice assistant activated");
          startVoiceEngine();
        };

        micContainer.appendChild(micButton);
        micContainer.appendChild(micText);
        document.body.appendChild(micContainer);
      }

      // ================= INIT =================
      window.addEventListener("load", function() {
        createMicButton();
        checkLanguageOnLoad(); // Check if we're returning to language selection
        autoReadPage();
        startVoiceEngine(); // 🔥 Start automatically (full kiosk mode)
        startSessionTimer();
      });
    </script>
  </body>
</html>
