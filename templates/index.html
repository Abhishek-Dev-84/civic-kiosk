{% load static %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}">
<head>
    <!-- Security Meta Tags -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://upload.wikimedia.org https://www.cdac.in; font-src 'self';">
    <meta name="referrer" content="same-origin">
    <meta name="robots" content="noindex, nofollow">
    
    <!-- Cache Control -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <style>
        /* Hide Google Translate elements */
        .goog-te-banner-frame.skiptranslate,
        .goog-te-gadget-icon,
        .goog-te-gadget-simple,
        #goog-gt-tt,
        .goog-te-balloon-frame,
        .goog-te-menu-frame,
        .goog-te-spinner-pos {
            display: none !important;
        }
        
        body {
            top: 0px !important;
            position: static !important;
        }
        
        .goog-te-combo {
            display: none !important;
        }
        
        .goog-te-gadget {
            color: transparent !important;
            height: 0 !important;
            overflow: hidden !important;
        }

        /* Timeout warning popup */
        .timeout-warning {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border: 4px solid #ff9933;
            border-radius: 40px;
            padding: 30px;
            text-align: center;
            z-index: 2000;
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .timeout-warning p {
            font-size: 24px;
            font-weight: 700;
            color: #333;
            margin-bottom: 20px;
        }

        .timeout-warning button {
            background: #28a745;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 15px 30px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            margin: 10px;
            min-width: 150px;
        }

        .timeout-warning .logout-btn {
            background: #dc3545;
        }
        
        .timeout-warning button:active {
            transform: translateY(3px);
        }

        /* Voice status indicator */
        .voice-status-indicator {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            z-index: 2000;
            display: none;
            align-items: center;
            gap: 10px;
            border: 2px solid #ff9933;
        }

        .voice-status-indicator.active {
            display: flex;
        }

        .voice-pulse {
            width: 12px;
            height: 12px;
            background: #28a745;
            border-radius: 50%;
            animation: voicePulse 1.5s infinite;
        }

        @keyframes voicePulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* CSRF Token (hidden) */
        #csrf_token {
            display: none;
        }

        /* Security Note */
        .security-note {
            position: fixed;
            bottom: 10px;
            right: 10px;
            font-size: 10px;
            color: #666;
            background: rgba(255,255,255,0.8);
            padding: 3px 8px;
            border-radius: 12px;
            z-index: 999;
        }

        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255,255,255,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        
        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #1e5fbf;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>

    <meta charset="UTF-8" />
    <title>Civic Services Kiosk - Language Selection</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
        .lang-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            margin: 30px 0;
        }
        .lang-btn {
            background: white;
            border: 4px solid #1e5fbf;
            border-radius: 40px;
            padding: 35px 20px;
            font-size: 42px;
            font-weight: 800;
            text-align: center;
            cursor: pointer;
            color: #1e5fbf;
            box-shadow: 0 8px 0 #0a3d7a;
            min-height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.1s ease;
            -webkit-tap-highlight-color: transparent;
        }
        .lang-btn:hover {
            background: #e3f2fd;
        }
        .lang-btn:active {
            transform: translateY(8px);
            box-shadow: 0 2px 0 #0a3d7a;
        }
        .lang-btn:focus-visible {
            outline: 3px solid #ff9933;
            outline-offset: 2px;
        }
        .lang-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: 0 4px 0 #0a3d7a;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #f0f7ff;
        }
        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 3px solid #1e5fbf;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .header-left img { height: 42px; }
        .header-left div { font-size: 13px; font-weight: 600; color: #1e5fbf; line-height: 1.2; }
        .header-right img { height: 38px; }
        .kiosk-container {
            position: fixed;
            top: 70px;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            overflow-y: auto;
        }
        .content-wrapper { width: 100%; max-width: 700px; }
        h1 { color: #1e5fbf; font-size: 36px; font-weight: 800; text-align: center; margin-bottom: 20px; }
        
        /* Voice button styles */
        .voice-corner {
            position: fixed;
            top: 80px;
            right: 15px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        
        .voice-corner-btn {
            background: #ff9933;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 3px 8px rgba(0,0,0,0.2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            transition: all 0.2s;
        }
        
        .voice-corner-btn:hover {
            background: #ffaa44;
        }
        
        .voice-corner-btn.listening {
            background: #28a745;
            animation: pulse 1s infinite;
            transform: scale(1.1);
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        .voice-corner-text {
            background: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            color: #ff9933;
            border: 1px solid #ff9933;
        }
        
        @media (max-width: 768px) {
            .lang-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
            .lang-btn {
                font-size: 32px;
                padding: 25px 15px;
                min-height: 120px;
            }
            h1 { font-size: 28px; }
        }
        
        @media (max-width: 480px) {
            .lang-btn {
                font-size: 24px;
                padding: 20px 10px;
                min-height: 100px;
            }
            .voice-corner {
                top: 75px;
                right: 10px;
            }
            .voice-corner-btn {
                width: 45px;
                height: 45px;
                font-size: 24px;
            }
        }
    </style>
</head>

<body>
    <!-- CSRF Token for JavaScript -->
    {% csrf_token %}
    <input type="hidden" id="csrf_token" value="{{ csrf_token }}">

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
    </div>

    <!-- Timeout Warning -->
    <div id="timeoutWarning" class="timeout-warning">
        <p>⏰ Session about to expire!</p>
        <button onclick="extendSession()">Continue</button>
        <button class="logout-btn" onclick="window.location='/';">Logout</button>
    </div>

    <!-- Voice Status Indicator -->
    <div id="voiceStatusIndicator" class="voice-status-indicator">
        <div class="voice-pulse"></div>
        <span id="voiceStatusText">Listening...</span>
    </div>

    <!-- Security Note -->
    <div class="security-note">
        🔒 Secured by Government of India
    </div>

    <div class="header">
        <div class="header-left">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/55/Emblem_of_India.svg" alt="Emblem of India" />
            <div>
                Ministry of Electronics &<br />
                Information Technology<br />
                Government of India
            </div>
        </div>
        <div class="header-right">
            <img src="https://www.cdac.in/img/cdac-logo.png" alt="CDAC Logo" />
        </div>
    </div>

    <div class="kiosk-container">
        <div class="content-wrapper">
            <h1>Select Language</h1>
            <div class="lang-grid">
                <div class="lang-btn" onclick="setLanguage('en')" role="button" tabindex="0" onkeypress="if(event.key==='Enter') setLanguage('en')" aria-label="English">English</div>
                <div class="lang-btn" onclick="setLanguage('hi')" role="button" tabindex="0" onkeypress="if(event.key==='Enter') setLanguage('hi')" aria-label="Hindi">हिंदी</div>
                <div class="lang-btn" onclick="setLanguage('or')" role="button" tabindex="0" onkeypress="if(event.key==='Enter') setLanguage('or')" aria-label="Odia">ଓଡ଼ିଆ</div>
                <div class="lang-btn" onclick="setLanguage('bn')" role="button" tabindex="0" onkeypress="if(event.key==='Enter') setLanguage('bn')" aria-label="Bengali">বাংলা</div>
                <div class="lang-btn" onclick="setLanguage('ta')" role="button" tabindex="0" onkeypress="if(event.key==='Enter') setLanguage('ta')" aria-label="Tamil">தமிழ்</div>
                <div class="lang-btn" onclick="setLanguage('te')" role="button" tabindex="0" onkeypress="if(event.key==='Enter') setLanguage('te')" aria-label="Telugu">తెలుగు</div>
            </div>
        </div>
    </div>

    <script>
        // ================= SECURITY ENHANCEMENTS =================

        // Disable keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            // F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U
            if (e.key === 'F12' || 
                (e.ctrlKey && e.shiftKey && e.key === 'I') ||
                (e.ctrlKey && e.shiftKey && e.key === 'J') ||
                (e.ctrlKey && e.key === 'U')) {
                e.preventDefault();
                return false;
            }
            
            // Prevent backspace from navigating back
            if (e.key === 'Backspace' && !e.target.matches('input, textarea, [contenteditable], button')) {
                e.preventDefault();
            }
        });

        // Disable right-click
        document.addEventListener('contextmenu', event => event.preventDefault());

        // Auto-hide cursor on touch devices
        let cursorTimeout;
        document.addEventListener('touchstart', function() {
            document.body.style.cursor = 'default';
            clearTimeout(cursorTimeout);
            cursorTimeout = setTimeout(function() {
                document.body.style.cursor = 'none';
            }, 3000);
        });

        // Prevent page zoom on double tap
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function(event) {
            const now = (new Date()).getTime();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, false);

        // ================= LANGUAGE MAP =================
        const languageMap = {
            "en": "en-IN",
            "hi": "hi-IN",
            "ta": "ta-IN",
            "te": "te-IN",
            "bn": "bn-IN",
            "or": "or-IN"
        };

        function getCurrentLang() {
            const path = window.location.pathname.split('/');
            return languageMap[path[1]] || "en-IN";
        }

        function getCurrentLangCode() {
            const path = window.location.pathname.split('/');
            return path[1] || "en";
        }

        // ================= TEXT TO SPEECH =================
        function speak(text) {
            if (!('speechSynthesis' in window)) return;

            speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = getCurrentLang();
            utterance.rate = 1;
            speechSynthesis.speak(utterance);
        }

        // ================= SESSION TIMER =================
        let sessionTimer;
        let timeoutWarningTimer;
        const SESSION_DURATION = 240000; // 4 minutes
        const WARNING_TIME = 60000; // Show warning 1 minute before expiry

        function startSessionTimer() {
            clearTimeout(sessionTimer);
            clearTimeout(timeoutWarningTimer);
            
            sessionTimer = setTimeout(() => {
                showTimeoutWarning();
            }, SESSION_DURATION - WARNING_TIME);
        }

        function showTimeoutWarning() {
            const warning = document.getElementById('timeoutWarning');
            if (warning) {
                warning.style.display = 'block';
                
                timeoutWarningTimer = setTimeout(() => {
                    window.location.href = "/";
                }, WARNING_TIME);
            }
        }

        function extendSession() {
            const warning = document.getElementById('timeoutWarning');
            if (warning) {
                warning.style.display = 'none';
            }
            clearTimeout(sessionTimer);
            clearTimeout(timeoutWarningTimer);
            startSessionTimer();
        }

        function resetSessionTimer() {
            clearTimeout(sessionTimer);
            clearTimeout(timeoutWarningTimer);
            startSessionTimer();
        }

        // ================= SET LANGUAGE FUNCTION =================
        let isLanguageChanging = false;

        function setLanguage(langCode) {
            if (isLanguageChanging) return;
            
            isLanguageChanging = true;
            
            // Show loading overlay
            document.getElementById('loadingOverlay').style.display = 'flex';
            
            // Disable all language buttons
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.style.pointerEvents = 'none';
                btn.style.opacity = '0.6';
                btn.disabled = true;
            });
            
            // Set cookie
            document.cookie = 'django_language=' + langCode + '; path=/';
            
            // Clear session storage except for autoStartVoice flag
            const autoStartVoice = sessionStorage.getItem('autoStartVoice');
            sessionStorage.clear();
            if (autoStartVoice) {
                sessionStorage.setItem('autoStartVoice', autoStartVoice);
            }
            
            // Store selected language in session
            sessionStorage.setItem('selectedLanguage', langCode);
            
            // Set flag to auto-start voice on next page
            sessionStorage.setItem('autoStartVoice', 'true');
            
            // Announce the selection
            const langNames = {
                'en': 'English',
                'hi': 'Hindi',
                'or': 'Odia',
                'bn': 'Bengali',
                'ta': 'Tamil',
                'te': 'Telugu'
            };
            
            speak(langNames[langCode] + ' selected. Redirecting to authentication page.');
            
            // Navigate to auth page with language code
            setTimeout(() => {
                window.location.href = '/' + langCode + '/auth/';
            }, 500);
        }

        // ================= CHECK FOR RETURN FROM OTHER PAGES =================
        function checkLanguageOnLoad() {
            const path = window.location.pathname;
            
            // If we're at root (/) and we came from another page
            if (path === '/' || path === '') {
                // Clear any language indicators to ensure English is default
                document.documentElement.lang = 'en';
                
                // Check if we came from a page (session might have selectedLanguage)
                const selectedLang = sessionStorage.getItem('selectedLanguage');
                if (selectedLang) {
                    // We came back from another page, just clear it
                    sessionStorage.removeItem('selectedLanguage');
                }
            }
        }

        // ================= SPEECH RECOGNITION ENGINE =================
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        
        // Initialize recognition if supported
        if (SpeechRecognition) {
            try {
                recognition = new SpeechRecognition();
                recognition.lang = getCurrentLang();
                recognition.continuous = true;
                recognition.interimResults = false;
            } catch (e) {
                console.error("Failed to initialize speech recognition:", e);
                recognition = null;
            }
        }

        let isListening = false;
        let voiceRestartTimeout = null;

        // ================= AUTO READ PAGE =================
        function autoReadPage() {
            setTimeout(() => {
                let heading = document.querySelector("h1");
                if (heading) {
                    speak(heading.innerText + ". Please select a language.");
                }
            }, 1000);
        }

        // ================= UNIVERSAL COMMAND HANDLER =================
        function handleCommand(command) {
            if (isLanguageChanging) return;
            
            command = command.toLowerCase();
            console.log("Heard:", command);

            const langCode = getCurrentLangCode();

            // LANGUAGE SELECTION
            if (command.includes("english") || command.includes("en")) {
                setLanguage('en');
                return;
            }
            else if (command.includes("hindi") || command.includes("hi") || command.includes("हिंदी")) {
                setLanguage('hi');
                return;
            }
            else if (command.includes("odia") || command.includes("oriya") || command.includes("or") || command.includes("ଓଡ଼ିଆ")) {
                setLanguage('or');
                return;
            }
            else if (command.includes("bengali") || command.includes("bangla") || command.includes("bn") || command.includes("বাংলা")) {
                setLanguage('bn');
                return;
            }
            else if (command.includes("tamil") || command.includes("ta") || command.includes("தமிழ்")) {
                setLanguage('ta');
                return;
            }
            else if (command.includes("telugu") || command.includes("te") || command.includes("తెలుగు")) {
                setLanguage('te');
                return;
            }
            
            // STOP LISTENING
            else if (command.includes("stop listening") || command.includes("stop voice")) {
                stopVoiceInput();
                return;
            }
            
            // START LISTENING
            else if (command.includes("start listening") || command.includes("start voice")) {
                startVoiceEngine();
                return;
            }
            
            // HOME - Already at home
            else if (command.includes("home") || command.includes("होम") || command.includes("ଘର")) {
                speak("You are already on the home page.");
                return;
            }
            
            // DEFAULT: Command not recognized
            else {
                speak("Command not recognized. Please say a language name.");
            }
        }

        // ================= VOICE ENGINE FUNCTIONS =================
        function startVoiceEngine() {
            if (!recognition) {
                alert("Speech recognition is not supported in your browser.");
                return;
            }

            if (isListening || isLanguageChanging) return;

            try {
                recognition.lang = getCurrentLang();
                
                recognition.onstart = function() {
                    isListening = true;
                    document.getElementById("voiceBtn").classList.add("listening");
                    document.getElementById("voiceStatus").innerText = "Listening...";
                    document.getElementById('voiceStatusIndicator').classList.add('active');
                };

                recognition.onresult = function(event) {
                    const transcript = event.results[event.results.length - 1][0].transcript;
                    handleCommand(transcript);
                };

                recognition.onerror = function(event) {
                    console.error("Recognition error:", event.error);
                    if (event.error === 'no-speech') return;
                    stopVoiceInput();
                };

                recognition.onend = function() {
                    if (isListening && !isLanguageChanging) {
                        // Auto restart after a small delay
                        if (voiceRestartTimeout) clearTimeout(voiceRestartTimeout);
                        voiceRestartTimeout = setTimeout(() => {
                            try {
                                recognition.start();
                            } catch (e) {
                                console.error("Failed to restart recognition:", e);
                                stopVoiceInput();
                            }
                        }, 1000);
                    } else {
                        stopVoiceInput();
                    }
                };

                recognition.start();
            } catch (e) {
                console.error("Failed to start voice engine:", e);
                stopVoiceInput();
            }
        }

        function stopVoiceInput() {
            isListening = false;
            if (recognition) {
                try {
                    recognition.stop();
                } catch (e) {}
            }
            document.getElementById("voiceBtn").classList.remove("listening");
            document.getElementById("voiceStatus").innerText = "Click";
            document.getElementById('voiceStatusIndicator').classList.remove('active');
            if (voiceRestartTimeout) {
                clearTimeout(voiceRestartTimeout);
            }
        }

        function toggleVoiceInput() {
            if (isListening) {
                stopVoiceInput();
            } else {
                startVoiceEngine();
            }
        }

        // ================= AUTO MIC BUTTON =================
        function createMicButton() {
            // Check if mic button already exists
            if (document.querySelector('.voice-corner')) return;

            const micContainer = document.createElement("div");
            micContainer.className = "voice-corner";

            const micButton = document.createElement("div");
            micButton.className = "voice-corner-btn";
            micButton.id = "voiceBtn";
            micButton.innerHTML = "🎤";
            micButton.setAttribute("aria-label", "Voice input");
            micButton.onclick = toggleVoiceInput;

            const micText = document.createElement("div");
            micText.className = "voice-corner-text";
            micText.id = "voiceStatus";
            micText.innerHTML = "Click";

            micContainer.appendChild(micButton);
            micContainer.appendChild(micText);
            document.body.appendChild(micContainer);
        }

        // ================= OVERRIDE DEFAULT HANDLE COMMAND =================
        window.handleCommand = handleCommand;

        // ================= OVERRIDE AUTO READ PAGE =================
        window.autoReadPage = autoReadPage;

        // ================= INIT =================
        document.addEventListener('DOMContentLoaded', function() {
            createMicButton();
            checkLanguageOnLoad();
            
            // Start session timer
            startSessionTimer();
            
            // Add activity listeners
            document.addEventListener('click', resetSessionTimer);
            document.addEventListener('keypress', resetSessionTimer);
            document.addEventListener('touchstart', resetSessionTimer);
            document.addEventListener('mousemove', resetSessionTimer);
            
            // Auto-read the page
            setTimeout(autoReadPage, 1500);
            
            // Auto-start voice for kiosk mode
            setTimeout(() => {
                startVoiceEngine();
            }, 2000);
        });

        window.addEventListener('beforeunload', function() {
            if (sessionTimer) {
                clearTimeout(sessionTimer);
            }
            if (timeoutWarningTimer) {
                clearTimeout(timeoutWarningTimer);
            }
            stopVoiceInput();
        });
    </script>
</body>
</html>
